<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup Q Game - A Logic Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-78WLSNMD0G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-78WLSNMD0G');
    </script>
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1 class="logo">Cup Q</h1>
            <div class="controls">
                <div class="timer" id="timerDisplay">0.0s</div>
            </div>
        </div>

        <p class="instructions">Guess the correct order. Shortcuts: <b>Q-T / Y-P</b> to swap. <b>Backspace/Esc</b> to
            cancel.</p>

        <div class="settings">
            <div class="mode-selection">
                <span class="mode-label">Cups:</span>
                <label class="mode-option">
                    <input type="radio" name="cupMode" value="3"> 3
                </label>
                <label class="mode-option">
                    <input type="radio" name="cupMode" value="4"> 4
                </label>
                <label class="mode-option">
                    <input type="radio" name="cupMode" value="5" checked> 5
                </label>
            </div>
            <div class="settings-actions">
                <button id="newGameBtn" class="new-game-btn">New Game</button>
                <button id="toggleHistoryBtn" class="theme-btn">Show History</button>
                <button id="themeToggle" class="theme-btn">🌙 Dark</button>
            </div>
        </div>

        <div class="game-area">
            <div class="board-container" id="boardContainer">
                <!-- Dynamic board content -->
            </div>
        </div>

        <div class="history-container hidden" id="historyContainer">
            <!-- Dynamic history rows -->
        </div>
    </div>

    <!-- Script at the end -->
    <script src="script.js"></script>
</body>

</html>
